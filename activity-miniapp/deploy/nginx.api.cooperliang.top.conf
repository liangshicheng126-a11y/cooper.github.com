# /etc/nginx/sites-available/api.cooperliang.top
# 安装：sudo cp deploy/nginx.api.cooperliang.top.conf /etc/nginx/sites-available/api.cooperliang.top
#       sudo ln -sf /etc/nginx/sites-available/api.cooperliang.top /etc/nginx/sites-enabled/
# SSL：sudo certbot --nginx -d api.cooperliang.top

upstream activity_miniapp_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.cooperliang.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cooperliang.top;

    # certbot 首次签发后会自动写入；也可手动指定腾讯云/Let's Encrypt 证书路径
    ssl_certificate     /etc/letsencrypt/live/api.cooperliang.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cooperliang.top/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ActivityMiniappSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    access_log /var/log/nginx/api.cooperliang.top.access.log;
    error_log  /var/log/nginx/api.cooperliang.top.error.log;

    location / {
        proxy_pass http://activity_miniapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
